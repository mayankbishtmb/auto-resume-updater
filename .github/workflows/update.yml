name: Auto Resume Update

on:
  push:
    branches:
      - main

jobs:
  update-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 🔥 Fix WeasyPrint dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libcairo2 libgdk-pixbuf2.0-0

      - name: Install Python dependencies
        run: |
          pip install requests jinja2 weasyprint

      - name: Run Automation Script
        run: python run.py

      # 🔥 Safe commit (no crash)
      - name: Commit Updated Resume
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/resume.pdf index.html || true
          git diff --cached --quiet || git commit -m "Auto update resume"
          git push || true

<!DOCTYPE html>
<html>
<head>
    <title>Resume</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #eef2f7;
        }

        .container {
            display: flex;
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .sidebar {
            width: 30%;
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .sidebar img {
            width: 120px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 15px;
        }

        .skills span {
            display: inline-block;
            background: #3498db;
            padding: 6px 10px;
            margin: 5px;
            border-radius: 6px;
        }

        .main {
            width: 70%;
            padding: 30px;
        }

        .links a {
            margin-right: 15px;
            text-decoration: none;
            color: #3498db;
        }

        .section {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="{{ avatar }}" alt="Profile">

        <h2>Skills</h2>
        {% for skill in skills %}
        <span>{{ skill }}</span>
        {% endfor %}
    </div>

    <!-- Main -->
    <div class="main">

        <h1>{{ name }}</h1>
        <p>{{ role }}</p>

        <div class="links">
            <a href="{{ github }}">GitHub</a>
            <a href="{{ linkedin }}">LinkedIn</a>
        </div>

        <div class="section">
            <h2>Profile</h2>
            <p>{{ bio }}</p>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <ul>
                {% for project in projects %}
                <li>{{ project }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>

</div>

</body>
</html>

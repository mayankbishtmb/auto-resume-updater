<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f7fa;
    transition: 0.3s;
}

.dark {
    background: #121212;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

.dark .container {
    background: #1e1e1e;
}

.header {
    display: flex;
    align-items: center;
    gap: 20px;
}

.profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

.social a {
    margin-right: 10px;
    font-size: 18px;
}

.btn {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.skills span {
    background: #4CAF50;
    padding: 5px 10px;
    margin: 5px;
    display: inline-block;
    border-radius: 15px;
}
</style>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</head>

<body>

<div class="container">

<div class="header">
<img src="../profile.jpg" class="profile-img">

<div>
<h2>{{ name }}</h2>
<p>Software Developer</p>

<div class="social">
<a href="https://github.com/{{ github_username }}"><i class="fab fa-github"></i></a>
<a href="https://linkedin.com/in/{{ linkedin }}"><i class="fab fa-linkedin"></i></a>
</div>

<button class="btn" onclick="toggleDark()">🌙 Toggle Dark Mode</button>
<a href="../resume.pdf" download><button class="btn">⬇ Download Resume</button></a>

</div>
</div>

<h3>About</h3>
<p>{{ summary }}</p>

<h3>Projects</h3>
{% for repo in repos %}
<p><b>{{ repo.name }}</b> - {{ repo.description }}</p>
{% endfor %}

<h3>Skills</h3>
<div class="skills">
{% for skill in skills %}
<span>{{ skill }}</span>
{% endfor %}
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Resume</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
        }

        .container {
            display: flex;
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* LEFT SIDE */
        .sidebar {
            width: 30%;
            background: #2c3e50;
            color: white;
            padding: 25px;
        }

        .sidebar h2 {
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .skills span {
            display: inline-block;
            background: #3498db;
            padding: 6px 10px;
            margin: 5px 5px 5px 0;
            border-radius: 5px;
            font-size: 13px;
        }

        /* RIGHT SIDE */
        .main {
            width: 70%;
            padding: 30px;
        }

        .header h1 {
            margin: 0;
            color: #2c3e50;
        }

        .header p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h2 {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 6px 0;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="sidebar">
        <h2>Skills</h2>
        <div class="skills">
            {% for skill in skills %}
            <span>{{ skill }}</span>
            {% endfor %}
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="main">

        <div class="header">
            <h1>{{ name }}</h1>
            <p>{{ role }}</p>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <ul>
                {% for project in projects %}
                <li>{{ project }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>

</div>

</body>
</html>

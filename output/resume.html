<!DOCTYPE html>
<html>
<head>
    <title>Resume</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            transition: 0.3s;
        }

        .dark {
            background: #1e1e1e;
            color: white;
        }

        .container {
            display: flex;
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in;
        }

        /* Sidebar */
        .sidebar {
            width: 30%;
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }

        .sidebar img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .skills span {
            display: inline-block;
            background: #3498db;
            padding: 6px 10px;
            margin: 5px;
            border-radius: 5px;
            font-size: 13px;
        }

        /* Main Content */
        .main {
            width: 70%;
            padding: 30px;
            background: white;
        }

        .header h1 {
            margin: 0;
            color: #2c3e50;
        }

        .header p {
            color: #7f8c8d;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            color: #3498db;
            text-decoration: none;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h2 {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 6px 0;
        }

        button {
            margin: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }

        /* Animation */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

    </style>
</head>

<body>

<!-- Dark Mode Button -->
<button onclick="toggleDark()">Toggle Dark Mode 🌙</button>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- ✅ Profile Image -->
        <img src="profile.jpg" alt="Profile">

        <h2>Skills</h2>
        <div class="skills">
            
            <span>CSS</span>
            
            <span>HTML</span>
            
            <span>JavaScript</span>
            
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            <h1>Ayush Raj</h1>
            <p>DevOps Enthusiast</p>

            <div class="links">
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
            </div>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <ul>
                
                <li>React Starter</li>
                
                <li>Cicd</li>
                
                <li>Memori</li>
                
                <li>Auto Resume Updater</li>
                
                <li>Group Project</li>
                
            </ul>
        </div>

        <div class="section">
            <h2>Experience</h2>
            <ul>
                
            </ul>
        </div>

        <div class="section">
            <h2>Education</h2>
            <ul>
                
            </ul>
        </div>

    </div>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>

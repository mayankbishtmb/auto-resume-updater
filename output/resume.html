<!DOCTYPE html>
<html>
<head>
    <title>Resume</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            transition: 0.3s;
        }

        .dark {
            background: #1e1e1e;
            color: white;
        }

        .container {
            display: flex;
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .sidebar {
            width: 30%;
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }

        .sidebar img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .skills span {
            display: inline-block;
            background: #3498db;
            padding: 6px 10px;
            margin: 5px;
            border-radius: 5px;
            font-size: 13px;
        }

        .main {
            width: 70%;
            padding: 30px;
            background: white;
        }

        .header h1 {
            margin: 0;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h2 {
            color: #3498db;
            border-bottom: 2px solid #3498db;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            color: #3498db;
            text-decoration: none;
        }

        button {
            margin-top: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }

        /* Animation */
        .container {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

    </style>
</head>

<body>

<button onclick="toggleDark()">Toggle Dark Mode 🌙</button>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <img src="output/profile.jpg" alt="Profile">

        <h2>Skills</h2>
        <div class="skills">
            
            <span>HTML</span>
            
            <span>JavaScript</span>
            
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h1>Ayush Raj</h1>
            <p>DevOps Enthusiast</p>

            <div class="links">
                <a href="https://github.com/Ayushraj2319">GitHub</a>
                <a href="https://linkedin.com/in/YOUR_LINKEDIN">LinkedIn</a>
            </div>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <ul>
                
                <li>Auto Resume Updater</li>
                
                <li>Group Project</li>
                
                <li>Devops 1</li>
                
            </ul>
        </div>

        <div class="section">
            <h2>Experience</h2>
            <ul>
                
                <li>Open Source Contributor</li>
                
                <li>Worked on DevOps automation project</li>
                
            </ul>
        </div>

        <div class="section">
            <h2>Education</h2>
            <ul>
                
                <li>B.Tech in Computer Science</li>
                
            </ul>
        </div>

    </div>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
